<!doctype html>
<html lang="en">
  <head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
      <h1>Get in Touch</h1>
    </header>

    <section class="intro-text">
      <p>
        Do you have questions about a specific hotel or need assistance planning
        your stay in Egypt? Our team is here to help. Use the form below to send
        us your inquiries, feedback, or booking requests, and we will get back
        to you within 24 hours.
      </p>
    </section>
    <form class="contact-form" action="thanku.html" method="GET">
      <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name" required />
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email" required />
      </div>
      <div class="form-group">
        <label>Phone Number:</label>
        <input type="tel" name="phone" />
      </div>
      <div class="form-group">
        <label>Comments:</label>
        <textarea name="comments" rows="4"></textarea>
      </div>
      <div class="button-container">
        <button type="submit">Send</button>
      </div>
    </form>
  </body>
</html>
