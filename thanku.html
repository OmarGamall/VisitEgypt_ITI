<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - Explore Egypt</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* Specific styling for the thank you box */
      .thank-you-box {
        background-color: hsla(32, 70%, 91%, 0.854);
        border: 5px solid #000;
        border-radius: 20px;
        padding: 40px;
        max-width: 600px;
        margin: 50px auto;
        text-align: center;
      }
      .thank-you-box h2 {
        color: #c5a059;
        font-size: 32px;
      }
      .back-home-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        background-color: #000;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      }
      .back-home-btn:hover {
        background-color: #c5a059;
      }
    </style>
  </head>
  <body class="content">
    <div class="thank-you-box">
      <h2>Shukran! (Thank You)</h2>
      <p>We have received your message regarding your stay in Egypt.</p>
      <p>
        Our travel specialists are reviewing your inquiry and will get back to
        you within 24 hours.
      </p>

      <a href="home.html" class="back-home-btn">Return to Homepage</a>
    </div>
  </body>
</html>
